services:
  vuejs-prod:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5174:8080"

  vuejs-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - path: ./src
          target: /cookbook-vue3-vite/src
          action: sync
        - path: ./package.json
          target: /cookbook-vue3-vite/package.json
          action: restart
        - path: ./vite.config.js
          target: /cookbook-vue3-vite/vite.config.js
          action: restart
